<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f5f5"/>
  <!-- Sign post -->
  <rect x="185" y="220" width="30" height="80" fill="#666"/>
  <!-- Sign board -->
  <rect x="80" y="40" width="240" height="180" fill="#f1c40f" rx="10" stroke="#e67e22" stroke-width="4"/>
  <!-- Warning triangle -->
  <path d="M200 60 L240 120 L160 120 Z" fill="white" stroke="#e74c3c" stroke-width="3"/>
  <text x="193" y="112" font-size="24" fill="#e74c3c" font-weight="bold">!</text>
  <!-- Helmet icon -->
  <path d="M170 140 Q200 120 230 140" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <rect x="170" y="140" width="60" height="10" fill="#e67e22" rx="2"/>
  <!-- Text on sign -->
  <text x="200" y="175" font-size="11" fill="#2c3e50" text-anchor="middle" font-weight="bold">SAFETY HELMETS</text>
  <text x="200" y="192" font-size="11" fill="#2c3e50" text-anchor="middle" font-weight="bold">MUST BE WORN</text>
  <text x="200" y="209" font-size="9" fill="#e74c3c" text-anchor="middle">REQUIRED</text>
  <!-- Construction fence -->
  <rect x="0" y="260" width="400" height="40" fill="#ff9800" opacity="0.3"/>
  <line x1="0" y1="260" x2="400" y2="260" stroke="#ff9800" stroke-width="3"/>
</svg>