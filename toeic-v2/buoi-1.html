<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOEIC V2 — Buổi 1: Vocabulary Intensive</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .toeic-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .timer { font-size: 1.3rem; font-weight: 700; color: var(--accent); font-family: monospace; }
    .part-nav { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .part-btn { padding: 0.5rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; }
    .part-btn.active { background: var(--card); color: var(--accent); border-color: var(--accent); }
    .part-btn.done { color: var(--success); border-color: var(--success); }
    .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
    .q-number { font-size: 0.8rem; color: var(--accent); font-weight: 600; margin-bottom: 0.5rem; }
    .q-text { font-size: 1rem; margin-bottom: 1rem; line-height: 1.6; white-space: pre-wrap; }
    .q-passage { background: var(--input-bg); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; line-height: 1.7; white-space: pre-wrap; }
    .choices { list-style: none; padding: 0; }
    .choices li { padding: 0.7rem 1rem; margin-bottom: 0.5rem; background: var(--input-bg); border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.15s; }
    .choices li:hover { border-color: var(--accent); }
    .choices li.selected { border-color: var(--accent); background: rgba(233,69,96,0.1); }
    .choices li.correct { border-color: var(--success); background: rgba(0,210,211,0.1); }
    .choices li.wrong { border-color: var(--accent); background: rgba(233,69,96,0.1); text-decoration: line-through; opacity: 0.6; }
    .explanation { margin-top: 1rem; padding: 0.8rem; background: var(--card); border-radius: 8px; font-size: 0.85rem; color: var(--text-dim); display: none; }
    .explanation.show { display: block; }
    .audio-btn { padding: 0.5rem 1rem; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; margin-bottom: 1rem; }
    .audio-btn:hover { background: var(--accent-light); }
    .nav-buttons { display: flex; justify-content: space-between; margin-top: 1.5rem; }
    .answer-sheet { margin-top: 1.5rem; padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
    .answer-sheet h3 { font-size: 0.9rem; margin-bottom: 0.8rem; color: var(--text-dim); }
    .sheet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 0.3rem; }
    .sheet-cell { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; background: var(--input-bg); border: 1px solid var(--border); }
    .sheet-cell.answered { background: var(--card); border-color: var(--accent); color: var(--accent); }
    .sheet-cell.current { border-color: var(--success); box-shadow: 0 0 0 2px rgba(0,210,211,0.3); }
    .results-panel { text-align: center; padding: 2rem; }
    .results-panel .score-big { font-size: 3rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--success)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .results-panel .breakdown { margin-top: 1rem; font-size: 0.9rem; color: var(--text-dim); }
    .speed-label { font-size: 0.75rem; color: var(--text-dim); margin-left: 0.5rem; }
    .vocab-tracker { margin-top: 1.5rem; padding: 1.2rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
    .vocab-tracker h3 { font-size: 0.9rem; margin-bottom: 1rem; color: var(--accent); }
    .word-family { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.8rem; }
    .word-family .root { font-weight: 700; color: var(--accent); min-width: 80px; }
    .word-chip { padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem; }
    .word-chip.hit { background: rgba(0,210,211,0.15); color: var(--success); border: 1px solid var(--success); }
    .word-chip.miss { background: rgba(233,69,96,0.1); color: var(--accent); border: 1px solid var(--accent); }
    .word-chip.untested { background: var(--input-bg); color: var(--text-dim); border: 1px solid var(--border); }
    .vocab-review-section { margin-top: 1.5rem; padding: 1.2rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
    .vocab-review-section h3 { font-size: 0.9rem; margin-bottom: 1rem; color: var(--accent); }
    .collocation-item { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; font-size: 0.9rem; }
    .collocation-item select { padding: 0.3rem 0.5rem; border-radius: 4px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); font-size: 0.85rem; }
    .collocation-item.correct select { border-color: var(--success); }
    .collocation-item.wrong select { border-color: var(--accent); }
    .check-vocab-btn { margin-top: 1rem; padding: 0.6rem 1.2rem; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>

const EXAM_DATA = {

      { id:1, text:"The project was delayed due to a _______ of qualified engineers.", choices:["lack","lacking","lacked","lackluster"], answer:"A", explanation:"'The lack of' = sự thiếu hụt (danh từ). Sau 'a' cần danh từ đếm được.", wordFamily:"lack" },
      { id:2, text:"Several departments are _______ the resources needed to complete the project.", choices:["lacking","lack","lacked","lacks"], answer:"A", explanation:"Present continuous: are + V-ing. 'lacking' = đang thiếu.", wordFamily:"lack" },

      { id:6, text:"After careful _______, the committee approved the budget increase.", choices:["consider","considerate","consideration","considerable"], answer:"C", explanation:"Sau 'careful' cần danh từ. 'consideration' = sự cân nhắc.", wordFamily:"consider" },

      { id:8, text:"The IT team is _______ a new security system for the building.", choices:["development","developing","developed","developer"], answer:"B", explanation:"Present continuous: is + V-ing. 'developing' = đang phát triển.", wordFamily:"develop" },
      { id:9, text:"Professional _______ opportunities are available for all employees.", choices:["develop","developing","development","developer"], answer:"C", explanation:"Cần danh từ bổ nghĩa cho 'opportunities'. 'development' = sự phát triển.", wordFamily:"develop" },
      { id:10, text:"All applicants are _______ to submit a cover letter with their resume.", choices:["requirement","requiring","required","requires"], answer:"C", explanation:"Passive: are + V3. 'are required to' = được yêu cầu phải.", wordFamily:"require" },

      { id:14, text:"The antique vase turned out to be extremely _______.", choices:["value","valuable","invaluable","valuation"], answer:"B", explanation:"Sau 'extremely' cần tính từ. 'valuable' = có giá trị cao (về tiền).", wordFamily:"value" },
      { id:15, text:"Her mentorship proved to be _______ for my career growth.", choices:["value","valuable","invaluable","valued"], answer:"C", explanation:"'invaluable' = vô giá (quý đến mức không thể định giá). Khác 'valuable' = có giá trị cao.", wordFamily:"value" }

      { id:16, passage:"To: All Staff\nFrom: HR Department\nSubject: Office Renovation\n\nDear colleagues,\n\nAfter careful (16)_______, management has decided to (17)_______ the layout of the third floor. We understand that some employees may feel (18)_______ with the current arrangement, and we want to address those concerns.\n\nThe renovation will (19)_______ approximately three weeks to complete.", text:"Question 16:", choices:["consideration","considerate","consider","considerably"], answer:"A", explanation:"Sau 'careful' cần danh từ. 'After careful consideration' = sau khi cân nhắc kỹ.", wordFamily:"consider" },
      { id:17, passage:"(same passage as Q16)", text:"Question 17:", choices:["alter","alteration","alternative","alternatively"], answer:"A", explanation:"Sau 'to' cần V nguyên mẫu. 'to alter the layout' = thay đổi bố cục.", wordFamily:"alter" },
      { id:18, passage:"(same passage as Q16)", text:"Question 18:", choices:["dissatisfied","satisfaction","satisfying","satisfy"], answer:"A", explanation:"'feel dissatisfied with' = cảm thấy không hài lòng với. Tính từ sau 'feel'.", wordFamily:"satisfy" },
      { id:19, passage:"(same passage as Q16)", text:"Question 19:", choices:["require","requirement","required","requiring"], answer:"A", explanation:"Sau 'will' cần V nguyên mẫu. 'will require three weeks' = sẽ cần 3 tuần.", wordFamily:"require" },

      { id:24, text:"Why does the department lack experienced staff?", choices:["Because most senior employees retired last year.","The staff meeting is at two o'clock.","Yes, I lack the time to explain."], answer:"A", explanation:"Hỏi 'why lack' → trả lời lý do cụ thể. 'lack' = thiếu.", audio_script:"Why does the department lack experienced staff? (A) Because most senior employees retired last year. (B) The staff meeting is at two o'clock. (C) Yes, I lack the time to explain.", wordFamily:"lack" },
      { id:25, text:"Has the new regulation altered your business operations?", choices:["The alternative plan was rejected.","Only slightly — we adjusted our delivery schedule.","I'll alter the document tomorrow."], answer:"B", explanation:"Hỏi 'has altered' → trả lời mức độ thay đổi. 'Only slightly' = chỉ một chút.", audio_script:"Has the new regulation altered your business operations? (A) The alternative plan was rejected. (B) Only slightly — we adjusted our delivery schedule. (C) I'll alter the document tomorrow.", wordFamily:"alter" },

      { id:27, text:"What skills does this position require?", choices:["Strong communication and project management.","The requirement was submitted yesterday.","Yes, it requires a lot of effort."], answer:"A", explanation:"Hỏi 'what require' → liệt kê kỹ năng cụ thể.", audio_script:"What skills does this position require? (A) Strong communication and project management. (B) The requirement was submitted yesterday. (C) Yes, it requires a lot of effort.", wordFamily:"require" },
      { id:28, text:"Are the clients satisfied with the final product?", choices:["The satisfaction survey is due next week.","Yes, they've already placed a follow-up order.","I'll satisfy the deadline."], answer:"B", explanation:"Yes/No question. 'placed a follow-up order' = bằng chứng hài lòng.", audio_script:"Are the clients satisfied with the final product? (A) The satisfaction survey is due next week. (B) Yes, they've already placed a follow-up order. (C) I'll satisfy the deadline.", wordFamily:"satisfy" },
      { id:29, text:"How can we develop stronger relationships with our suppliers?", choices:["The development team is on the fifth floor.","By scheduling regular face-to-face meetings.","It was developed last quarter."], answer:"B", explanation:"Hỏi 'how develop' → trả lời phương pháp. 'develop relationships' = xây dựng mối quan hệ.", audio_script:"How can we develop stronger relationships with our suppliers? (A) The development team is on the fifth floor. (B) By scheduling regular face-to-face meetings. (C) It was developed last quarter.", wordFamily:"develop" },
      { id:30, text:"Do you value work-life balance over a higher salary?", choices:["The valuation report is ready.","Absolutely — health and family come first.","The product is quite valuable."], answer:"B", explanation:"'Do you value' = bạn có coi trọng không → trả lời quan điểm.", audio_script:"Do you value work-life balance over a higher salary? (A) The valuation report is ready. (B) Absolutely — health and family come first. (C) The product is quite valuable.", wordFamily:"value" }
    ]}
  ]
};

const VOCAB_REVIEW_DATA = {
  collocations: [
    { stem: "a lack ___", options: ["of","for","to","with"], answer: "of", hint: "a lack OF something" },
    { stem: "alter → noun form:", options: ["alteration","alternative","alter","altered"], answer: "alteration", hint: "the act of altering" },
    { stem: "take ___ consideration", options: ["into","for","with","on"], answer: "into", hint: "take INTO consideration" },
    { stem: "satisfy → adjective (negative):", options: ["dissatisfied","unsatisfying","dissatisfaction","satisfactory"], answer: "dissatisfied", hint: "be dissatisfied WITH" },
    { stem: "meet the ___", options: ["requirements","requires","requiring","required"], answer: "requirements", hint: "meet the requirements" },
    { stem: "___ development", options: ["professional","profession","professionally","professing"], answer: "professional", hint: "professional development = phát triển nghề nghiệp" },
    { stem: "valuable vs invaluable:", options: ["invaluable = priceless","invaluable = worthless","same meaning","invaluable = less valuable"], answer: "invaluable = priceless", hint: "invaluable = quý đến mức KHÔNG THỂ định giá" },
    { stem: "consider → adj (caring):", options: ["considerate","considerable","considered","considering"], answer: "considerate", hint: "a considerate person = người biết quan tâm" },
    { stem: "require + object + ___", options: ["to + V","V-ing","V bare","that + V"], answer: "to + V", hint: "require someone TO DO something" },
    { stem: "develop a ___", options: ["habit","develop","development","developing"], answer: "habit", hint: "develop a habit = hình thành thói quen" }
  ],
  wordFamilies: {
    "lack": ["lack (n/v)", "lacking (adj)"],
    "alter": ["alter (v)", "alteration (n)", "alternative (n/adj)", "alternatively (adv)"],
    "consider": ["consider (v)", "consideration (n)", "considerate (adj)", "considerable (adj)", "considerably (adv)"],
    "develop": ["develop (v)", "development (n)", "developer (n)", "developing (adj)"],
    "require": ["require (v)", "requirement (n)", "required (adj)"],
    "satisfy": ["satisfy (v)", "satisfaction (n)", "satisfactory (adj)", "satisfying (adj)", "dissatisfied (adj)"],
    "value": ["value (n/v)", "valuable (adj)", "invaluable (adj)", "valuation (n)"]
  }
};

class ToeicExamV2 {
  constructor(data, vocabData) {
    this.data = data;
    this.vocabData = vocabData;
    this.allQuestions = [];
    this.data.parts.forEach(p => p.questions.forEach(q => { q.partNum = p.number; this.allQuestions.push(q); }));
    this.shuffleMap = this.buildShuffleMap();
    this.currentIdx = 0;
    this.answers = {};
    this.submitted = false;
    this.startTime = Date.now();
    this.synth = window.speechSynthesis;
    this.voice = null;
    this.timerInterval = null;
    this.init();
  }

  buildShuffleMap() {
    const map = {};
    this.allQuestions.forEach(q => {
      const indices = q.choices.map((_, i) => i);
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      map[q.id] = indices;
    });
    return map;
  }

  getShuffledChoices(q) {
    return this.shuffleMap[q.id].map(i => q.choices[i]);
  }

  getShuffledAnswer(q) {
    const letters = ['A','B','C','D'];
    const origIdx = letters.indexOf(q.answer);
    const newIdx = this.shuffleMap[q.id].indexOf(origIdx);
    return letters[newIdx];
  }

  init() {
    this.loadVoice();
    this.renderPartNav();
    this.renderAnswerSheet();
    this.renderQuestion();
    this.bindEvents();
    this.startTimer();
  }

  loadVoice() {
    const set = () => {
      const voices = this.synth.getVoices();
      this.voice = voices.find(v => v.lang.startsWith('en-US')) || voices.find(v => v.lang.startsWith('en')) || voices[0];
    };
    set();
    this.synth.onvoiceschanged = set;
  }

  startTimer() {
    this.timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }, 1000);
  }

  renderPartNav() {
    const nav = document.getElementById('partNav');
    nav.innerHTML = this.data.parts.map((p, i) =>
      `<button class="part-btn${i === 0 ? ' active' : ''}" data-part="${i}">${p.name}</button>`
    ).join('');
  }

  renderAnswerSheet() {
    const sheet = document.getElementById('answerSheet');
    sheet.innerHTML = this.allQuestions.map((q, i) =>
      `<div class="sheet-cell${i === 0 ? ' current' : ''}" data-idx="${i}">${q.id}</div>`
    ).join('');
  }

  renderQuestion() {
    const q = this.allQuestions[this.currentIdx];
    const area = document.getElementById('questionArea');
    const letters = ['A','B','C','D'];
    const shuffledChoices = this.getShuffledChoices(q);
    const correctLetter = this.getShuffledAnswer(q);
    const userAns = this.answers[q.id];

    let html = `<div class="question-card">`;
    html += `<div class="q-number">Question ${q.id} — Part ${q.partNum}</div>`;

    if (q.passage && !q.passage.startsWith('(same')) {
      html += `<div class="q-passage">${q.passage}</div>`;
    }

    if (q.audio_script) {
      html += `<button class="audio-btn" onclick="exam.playAudio(${this.currentIdx})">&#9654; Nghe audio</button>`;
      html += `<span class="speed-label">TTS 0.85x</span>`;
    }

    html += `<div class="q-text">${q.text}</div>`;
    html += `<ul class="choices">`;
    shuffledChoices.forEach((c, i) => {
      let cls = '';
      if (this.submitted) {
        if (letters[i] === correctLetter) cls = 'correct';
        else if (letters[i] === userAns) cls = 'wrong';
      } else if (letters[i] === userAns) {
        cls = 'selected';
      }
      html += `<li class="${cls}" data-choice="${letters[i]}">${letters[i]}. ${c}</li>`;
    });
    html += `</ul>`;

    if (this.submitted) {
      html += `<div class="explanation show">${q.explanation}</div>`;
    }
    html += `</div>`;

    area.innerHTML = html;

    if (!this.submitted) {
      area.querySelectorAll('.choices li').forEach(li => {
        li.addEventListener('click', () => this.selectAnswer(q.id, li.dataset.choice));
      });
    }

    document.getElementById('btnPrev').disabled = this.currentIdx === 0;
    document.getElementById('btnNext').style.display = this.currentIdx < this.allQuestions.length - 1 ? '' : 'none';
    document.getElementById('btnSubmit').style.display = (!this.submitted && this.currentIdx === this.allQuestions.length - 1) ? '' : 'none';
    this.updateSheetHighlight();
  }

  selectAnswer(qId, choice) {
    if (this.submitted) return;
    this.answers[qId] = choice;
    this.renderQuestion();
    this.updateSheetCell(qId);
  }

  updateSheetHighlight() {
    document.querySelectorAll('.sheet-cell').forEach((cell, i) => {
      cell.classList.toggle('current', i === this.currentIdx);
    });
  }

  updateSheetCell(qId) {
    const idx = this.allQuestions.findIndex(q => q.id === qId);
    const cell = document.querySelectorAll('.sheet-cell')[idx];
    if (cell) cell.classList.add('answered');
  }

  playAudio(idx) {
    const q = this.allQuestions[idx];
    if (!q.audio_script) return;
    this.synth.cancel();
    if (window.AudioEngine) {
      window.AudioEngine.play({ key: `toeic:${q.id}`, text: q.audio_script, rate: 0.85, voice: this.voice });
      return;
    }
    const utt = new SpeechSynthesisUtterance(q.audio_script);
    utt.voice = this.voice;
    utt.rate = 0.85;
    this.synth.speak(utt);
  }

  goTo(idx) {
    this.currentIdx = Math.max(0, Math.min(idx, this.allQuestions.length - 1));
    this.renderQuestion();
  }

  submit() {
    if (this.submitted) return;
    this.submitted = true;
    clearInterval(this.timerInterval);

    let correct = 0;
    this.allQuestions.forEach(q => {
      if (this.answers[q.id] === this.getShuffledAnswer(q)) correct++;
    });
    const total = this.allQuestions.length;
    const pct = Math.round((correct / total) * 100);

    const area = document.getElementById('questionArea');
    area.innerHTML = `<div class="results-panel">
      <h2>Kết quả</h2>
      <div class="score-big">${pct}%</div>
      <div class="breakdown">${correct} / ${total} câu đúng</div>
      <div class="breakdown" style="margin-top:1rem;">
        ${this.data.parts.map(p => {
          const pqs = p.questions;
          const pc = pqs.filter(q => this.answers[q.id] === this.getShuffledAnswer(q)).length;
          return `${p.name}: ${pc}/${pqs.length}`;
        }).join('<br>')}
      </div>
      <button class="btn btn-play" style="margin-top:1.5rem;" onclick="exam.reviewAll()">Xem lại đáp án</button>
    </div>`;

    this.renderWordFamilyTracker();
    this.renderVocabReview();
  }

  renderWordFamilyTracker() {
    const tracker = document.getElementById('vocabTracker');
    tracker.style.display = 'block';
    let html = `<h3>Word Family Tracker</h3>`;

    const families = this.vocabData.wordFamilies;
    for (const [root, members] of Object.entries(families)) {
      const relatedQs = this.allQuestions.filter(q => q.wordFamily === root);
      const correctCount = relatedQs.filter(q => this.answers[q.id] === this.getShuffledAnswer(q)).length;
      html += `<div class="word-family">`;
      html += `<span class="root">${root.toUpperCase()}</span>`;
      html += `<span class="word-chip ${correctCount === relatedQs.length ? 'hit' : correctCount > 0 ? 'hit' : 'miss'}">${correctCount}/${relatedQs.length} đúng</span>`;
      members.forEach(m => {
        html += `<span class="word-chip untested">${m}</span>`;
      });
      html += `</div>`;
    }
    tracker.innerHTML = html;
  }

  renderVocabReview() {
    const section = document.getElementById('vocabReview');
    section.style.display = 'block';
    const colls = this.vocabData.collocations;
    let html = `<h3>Vocabulary Review — Collocations & Word Forms</h3>`;
    html += `<div id="collocationList">`;
    colls.forEach((c, i) => {
      html += `<div class="collocation-item" data-idx="${i}">
        <span>${c.stem}</span>
        <select data-idx="${i}">
          <option value="">-- chọn --</option>
          ${c.options.map(o => `<option value="${o}">${o}</option>`).join('')}
        </select>
      </div>`;
    });
    html += `</div>`;
    html += `<button class="check-vocab-btn" onclick="exam.checkVocabReview()">Kiểm tra</button>`;
    html += `<div id="vocabScore" style="margin-top:0.8rem;font-size:0.9rem;color:var(--text-dim);"></div>`;
    section.innerHTML = html;
  }

  checkVocabReview() {
    const colls = this.vocabData.collocations;
    let correct = 0;
    document.querySelectorAll('.collocation-item').forEach((item, i) => {
      const select = item.querySelector('select');
      const val = select.value;
      item.classList.remove('correct', 'wrong');
      if (val === colls[i].answer) {
        item.classList.add('correct');
        correct++;
      } else {
        item.classList.add('wrong');
      }
    });
    document.getElementById('vocabScore').textContent = `${correct}/${colls.length} đúng`;
  }

  reviewAll() {
    this.currentIdx = 0;
    this.renderQuestion();
  }

  bindEvents() {
    document.getElementById('btnNext').addEventListener('click', () => this.goTo(this.currentIdx + 1));
    document.getElementById('btnPrev').addEventListener('click', () => this.goTo(this.currentIdx - 1));
    document.getElementById('btnSubmit').addEventListener('click', () => this.submit());

    document.getElementById('partNav').addEventListener('click', (e) => {
      if (!e.target.classList.contains('part-btn')) return;
      const partIdx = parseInt(e.target.dataset.part);
      let offset = 0;
      for (let i = 0; i < partIdx; i++) offset += this.data.parts[i].questions.length;
      this.goTo(offset);
      document.querySelectorAll('.part-btn').forEach((b, i) => b.classList.toggle('active', i === partIdx));
    });

    document.getElementById('answerSheet').addEventListener('click', (e) => {
      const cell = e.target.closest('.sheet-cell');
      if (cell) this.goTo(parseInt(cell.dataset.idx));
    });
  }
}

const exam = new ToeicExamV2(EXAM_DATA, VOCAB_REVIEW_DATA);
  </script>
</body>
</html>
