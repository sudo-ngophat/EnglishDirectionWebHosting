<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f5f5"/>
  <!-- Table -->
  <ellipse cx="200" cy="200" rx="100" ry="30" fill="#8B4513"/>
  <!-- Plate -->
  <ellipse cx="200" cy="185" rx="35" ry="10" fill="white" stroke="#ddd" stroke-width="2"/>
  <!-- Food on plate -->
  <ellipse cx="195" cy="182" rx="12" ry="5" fill="#e67e22"/>
  <ellipse cx="208" cy="183" rx="8" ry="4" fill="#27ae60"/>
  <!-- Glass -->
  <rect x="250" y="165" width="15" height="25" fill="rgba(200,230,255,0.5)" stroke="#aaa" stroke-width="1" rx="2"/>
  <!-- Customer (happy) -->
  <circle cx="200" cy="120" r="25" fill="#fdbcb4"/>
  <path d="M175 120 Q175 92 200 92 Q225 92 225 120" fill="#2c3e50"/>
  <rect x="180" y="145" width="40" height="50" fill="#9b59b6" rx="4"/>
  <!-- Happy smile -->
  <path d="M190 125 Q200 135 210 125" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="192" cy="117" r="3" fill="#333"/>
  <circle cx="208" cy="117" r="3" fill="#333"/>
  <!-- Thumbs up -->
  <path d="M225 150 L245 140" stroke="#fdbcb4" stroke-width="7" stroke-linecap="round"/>
  <circle cx="248" cy="137" r="6" fill="#fdbcb4"/>
  <!-- Waiter in background -->
  <circle cx="330" cy="130" r="15" fill="#d4a574"/>
  <rect x="320" y="145" width="20" height="40" fill="white" rx="3"/>
  <rect x="325" y="145" width="10" height="5" fill="#333"/>
</svg>