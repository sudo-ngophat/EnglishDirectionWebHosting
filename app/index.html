<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adaptive Study Hub — Lộ trình thích nghi</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .ash-top { display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:1rem; }
    .ash-counters { font-size:0.85rem; color:var(--text-dim); }
    .ash-counters b { color:var(--success); }
    .ash-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; min-height:280px; }
    .phase-label { font-size:0.75rem; color:var(--accent); font-weight:600; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.5rem; }
    .word-prompt { font-size:1.4rem; font-weight:700; margin-bottom:1rem; }
    .sub-prompt { font-size:0.9rem; color:var(--text-dim); margin-bottom:1.2rem; line-height:1.6; }
    .ash-input { width:100%; padding:0.8rem 1rem; font-size:1rem; background:var(--input-bg); border:2px solid var(--border); border-radius:8px; color:var(--text); outline:none; }
    .ash-input.correct { border-color:var(--success); } .ash-input.wrong { border-color:var(--accent); }
    .choices { list-style:none; padding:0; } .choices li { padding:0.7rem 1rem; margin-bottom:0.5rem; background:var(--input-bg); border:2px solid var(--border); border-radius:8px; cursor:pointer; }
    .choices li.correct { border-color:var(--success); background:rgba(0,210,211,0.1); } .choices li.wrong { border-color:var(--accent); background:rgba(233,69,96,0.1); }
    .feedback-box { margin-top:1rem; padding:0.8rem; border-radius:8px; font-size:0.85rem; display:none; }
    .feedback-box.show { display:block; } .feedback-box.ok { background:rgba(0,210,211,0.1); color:var(--success); } .feedback-box.err { background:rgba(233,69,96,0.1); color:var(--accent); }
    .ash-nav { display:flex; justify-content:flex-end; margin-top:1.2rem; gap:0.6rem; }
    .audio-btn { padding:0.5rem 1rem; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor:pointer; margin-bottom:1rem; }
    .progress-wrap { display:flex; gap:1rem; flex-wrap:wrap; margin-top:1rem; }
    .stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.4rem; text-align:center; }
    .stat .n { font-size:1.8rem; font-weight:700; color:var(--success); } .stat .l { font-size:0.75rem; color:var(--text-dim); }
    .empty { text-align:center; padding:2rem; color:var(--text-dim); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><a href="../index.html">&larr;</a><h1>Adaptive Study Hub</h1></div>
    <div class="ash-top">
      <div class="ash-counters">Phiên hôm nay: <b id="cDone">0</b>/<span id="cTotal">0</span> · Streak <b id="cStreak">0</b></div>
      <button class="btn btn-secondary" id="btnProgress">Tiến độ</button>
    </div>
    <div class="ash-card" id="card"></div>
    <div class="ash-nav"><button class="btn btn-play" id="btnNext" disabled>Tiếp &rarr;</button></div>
  </div>
  <script src="../js/kokoro-audio.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
