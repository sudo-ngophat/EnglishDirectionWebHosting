<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luyện Phát Âm — Pronunciation Scoring</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .pron-controls { display: flex; flex-wrap: wrap; gap: 0.8rem; align-items: center; margin-bottom: 1.5rem; }
    .pron-controls select { padding: 0.5rem 0.8rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; }
    .warn-box { background: rgba(233,69,96,0.08); border: 1px solid var(--accent); border-radius: var(--radius); padding: 1rem 1.2rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--text-dim); }
    .warn-box strong { color: var(--accent-light); }
    .pron-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem 1.5rem; text-align: center; min-height: 320px; }
    .word-big { font-size: 2.6rem; font-weight: 800; color: var(--text); letter-spacing: 0.02em; }
    .word-ipa { font-size: 1.1rem; color: var(--success); margin-top: 0.4rem; }
    .word-meaning { font-size: 0.95rem; color: var(--text-dim); margin-top: 0.5rem; }
    .btn-row { display: flex; justify-content: center; gap: 0.8rem; flex-wrap: wrap; margin-top: 1.5rem; }
    .mic-btn { padding: 0.9rem 1.6rem; background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.2s; }
    .mic-btn:hover { background: var(--accent-light); }
    .mic-btn.recording { background: var(--success); color: var(--bg); animation: pulse 1s infinite; }
    .mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .listen-btn { padding: 0.9rem 1.4rem; background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 1rem; }
    .listen-btn:hover { border-color: var(--accent); color: var(--accent); }
    .score-ring { margin: 1.5rem auto 0; width: 120px; height: 120px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; font-size: 2rem; border: 6px solid var(--border); transition: all 0.3s; }
    .score-ring .lbl { font-size: 0.65rem; font-weight: 600; color: var(--text-dim); letter-spacing: 0.08em; }
    .score-ring.good { border-color: var(--success); color: var(--success); }
    .score-ring.mid { border-color: #f1c40f; color: #f1c40f; }
    .score-ring.low { border-color: var(--accent); color: var(--accent); }
    .heard { margin-top: 1rem; font-size: 0.9rem; color: var(--text-dim); min-height: 1.4rem; }
    .heard b { color: var(--text); }
    .tip-msg { margin-top: 0.8rem; font-size: 0.85rem; color: var(--text-dim); }
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.2rem; }
    .counter { font-size: 0.85rem; color: var(--text-dim); }
    .counter .num { color: var(--success); font-weight: 700; }
    .avg-bar { margin-top: 1.5rem; padding: 1rem; background: var(--card); border-radius: var(--radius); font-size: 0.85rem; color: var(--text-dim); display: none; }
    .avg-bar.show { display: block; }
    .avg-bar .big { font-size: 1.6rem; font-weight: 800; color: var(--success); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="index.html">&larr;</a>
      <h1>Luyện Phát Âm</h1>
    </div>
    <p class="hint">Nghe mẫu &rarr; bấm micro &rarr; nói từ &rarr; hệ thống nhận diện và chấm điểm phát âm của bạn.</p>

    <div class="warn-box" id="supportWarn" style="display:none;">
      <strong>Trình duyệt chưa hỗ trợ.</strong> Tính năng chấm phát âm cần <strong>Chrome</strong> hoặc <strong>Edge</strong>, có <strong>micro</strong> và <strong>kết nối internet</strong>. Nút nghe mẫu vẫn dùng được.
    </div>

    <div class="pron-controls">
      <label>Buổi:</label>
      <select id="lessonSel"></select>
      <label>Giọng mẫu:</label>
      <select id="voiceSel"></select>
    </div>

    <div class="pron-card">
      <div class="word-big" id="wordBig">—</div>
      <div class="word-ipa" id="wordIpa"></div>
      <div class="word-meaning" id="wordMeaning"></div>

      <div class="btn-row">
        <button class="listen-btn" id="btnListen">&#9654; Nghe mẫu</button>
        <button class="mic-btn" id="btnMic">&#127908; Nói</button>
      </div>

      <div class="score-ring" id="scoreRing" style="display:none;">
        <span class="lbl">ĐIỂM</span>
        <span id="scoreVal">0</span>
      </div>
      <div class="heard" id="heard"></div>
      <div class="tip-msg" id="tipMsg"></div>
    </div>

    <div class="nav-row">
      <div class="counter">Từ <span class="num" id="curNum">1</span> / <span id="totalNum">1</span></div>
      <div>
        <button class="btn btn-secondary" id="btnPrev">&larr; Trước</button>
        <button class="btn btn-play" id="btnNext">Sau &rarr;</button>
      </div>
    </div>

    <div class="avg-bar" id="avgBar">
      Điểm trung bình buổi này: <span class="big" id="avgVal">0</span> / 100
      <span id="avgCount"></span>
    </div>
  </div>

  <script src="js/pronunciation-data.js"></script>
  <script src="js/human-audio.js"></script>
  <script src="js/audio-engine.js"></script>
  <script src="js/audio-settings.js"></script>
  <script src="js/pronunciation.js"></script>
</body>
</html>
