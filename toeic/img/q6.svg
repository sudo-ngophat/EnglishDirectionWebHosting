<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f5f5"/>
  <!-- Display case -->
  <rect x="150" y="140" width="200" height="100" fill="rgba(200,230,255,0.3)" stroke="#aaa" stroke-width="2" rx="5"/>
  <rect x="150" y="240" width="200" height="15" fill="#2c3e50"/>
  <!-- Necklace on display -->
  <path d="M220 170 Q250 200 280 170" stroke="#f1c40f" stroke-width="3" fill="none"/>
  <circle cx="250" cy="195" r="8" fill="#f1c40f" stroke="#e67e22" stroke-width="2"/>
  <!-- Gems -->
  <circle cx="250" cy="195" r="4" fill="#e74c3c"/>
  <circle cx="230" cy="180" r="3" fill="#3498db"/>
  <circle cx="270" cy="180" r="3" fill="#2ecc71"/>
  <!-- Jeweler figure -->
  <circle cx="100" cy="130" r="22" fill="#fdbcb4"/>
  <path d="M78 130 Q78 105 100 105 Q122 105 122 130" fill="#333"/>
  <rect x="80" y="152" width="40" height="55" fill="#2c3e50" rx="4"/>
  <!-- Magnifying glass -->
  <circle cx="165" cy="175" r="18" stroke="#666" stroke-width="3" fill="rgba(200,230,255,0.3)"/>
  <line x1="155" y1="190" x2="140" y2="210" stroke="#666" stroke-width="4" stroke-linecap="round"/>
  <!-- Arm holding magnifying glass -->
  <path d="M120 165 Q140 170 152 178" stroke="#fdbcb4" stroke-width="7" stroke-linecap="round"/>
  <!-- Jeweler's eye (focused) -->
  <circle cx="105" cy="128" r="3" fill="#333"/>
  <circle cx="115" cy="128" r="3" fill="#333"/>
  <!-- Eyepiece/loupe -->
  <circle cx="115" cy="125" r="7" stroke="#333" stroke-width="2" fill="rgba(200,230,255,0.4)"/>
</svg>