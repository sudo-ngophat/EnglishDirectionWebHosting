<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buổi 12 — 4-in-1 Drill</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .phase-bar { display: flex; gap: 0.3rem; margin-bottom: 1.5rem; }
    .phase-dot { flex: 1; height: 6px; border-radius: 3px; background: var(--border); transition: background 0.3s; }
    .phase-dot.done { background: var(--success); }
    .phase-dot.active { background: var(--accent); }
    .drill-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; min-height: 300px; }
    .phase-label { font-size: 0.75rem; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .word-prompt { font-size: 1.4rem; font-weight: 700; margin-bottom: 1rem; color: var(--text); }
    .sub-prompt { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 1.2rem; line-height: 1.6; }
    .drill-input { width: 100%; padding: 0.8rem 1rem; font-size: 1rem; background: var(--input-bg); border: 2px solid var(--border); border-radius: 8px; color: var(--text); outline: none; transition: border-color 0.2s; }
    .drill-input:focus { border-color: var(--accent); }
    .drill-input.correct { border-color: var(--success); background: rgba(0,210,211,0.05); }
    .drill-input.wrong { border-color: var(--accent); background: rgba(233,69,96,0.05); }
    .choices { list-style: none; padding: 0; }
    .choices li { padding: 0.7rem 1rem; margin-bottom: 0.5rem; background: var(--input-bg); border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.15s; font-size: 0.95rem; }
    .choices li:hover { border-color: var(--accent); }
    .choices li.correct { border-color: var(--success); background: rgba(0,210,211,0.1); }
    .choices li.wrong { border-color: var(--accent); background: rgba(233,69,96,0.1); opacity: 0.6; }
    .feedback-box { margin-top: 1rem; padding: 0.8rem; border-radius: 8px; font-size: 0.85rem; display: none; }
    .feedback-box.show { display: block; }
    .feedback-box.ok { background: rgba(0,210,211,0.1); color: var(--success); border: 1px solid var(--success); }
    .feedback-box.err { background: rgba(233,69,96,0.1); color: var(--accent); border: 1px solid var(--accent); }
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.2rem; }
    .score-bar { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--text-dim); }
    .score-bar .num { font-weight: 700; color: var(--success); }
    .audio-btn { padding: 0.5rem 1rem; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; margin-bottom: 1rem; }
    .transform-box { background: var(--input-bg); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; line-height: 1.7; }
    .transform-box .original { color: var(--text-dim); }
    .transform-box .arrow { color: var(--accent); margin: 0.5rem 0; }
    .hint-text { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.5rem; cursor: pointer; }
    .hint-text:hover { color: var(--accent); }
    .results-panel { text-align: center; padding: 2rem 1rem; }
    .results-panel .big-score { font-size: 3rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--success)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .results-panel .breakdown { margin-top: 1rem; text-align: left; font-size: 0.85rem; color: var(--text-dim); }
    .breakdown-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid var(--border); }
    .mistakes-list { margin-top: 1.5rem; text-align: left; }
    .mistakes-list h4 { font-size: 0.9rem; color: var(--accent); margin-bottom: 0.8rem; }
    .mistake-item { padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .mistake-item .mword { font-weight: 600; color: var(--text); }
    .mistake-item .mdetail { color: var(--text-dim); margin-top: 0.2rem; }
    .speed-control { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; font-size: 0.8rem; color: var(--text-dim); }
    .speed-control select { padding: 0.3rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="../index.html">&larr;</a>
      <h1>Buổi 12 — 4-in-1 Drill</h1>
    </div>
    <p class="hint">Mỗi từ test qua 4 kỹ năng: Nghe-Viết → Nghĩa → Ngữ pháp → TOEIC | Trọng tâm Buổi 12: Comparison — Compare Options, Criteria, Advantages & Preferences</p>

    <div class="phase-bar" id="phaseBar"></div>
    <div class="drill-card" id="drillCard"></div>
    <div class="nav-row">
      <div class="score-bar"><span class="num" id="scoreNum">0</span> / <span id="totalNum">0</span> đúng</div>
      <div>
        <button class="btn btn-secondary" id="btnSkip">Bỏ qua</button>
        <button class="btn btn-play" id="btnNext" disabled>Tiếp &rarr;</button>
      </div>
    </div>
  </div>

  <script src="../js/human-audio.js"></script>
  <script src="../js/audio-engine.js"></script>
  <script src="../js/audio-settings.js"></script>
  <script src="../js/word-stats.js"></script>
  <script>
const WORDS = [
  {
    word: "compare",
    ipa: "/kəmˈper/",
    meaning: "so sánh hai hoặc nhiều lựa chọn để thấy điểm giống và khác",
    confusers: ["contrast", "prefer", "choose"],
    confuserMeanings: ["đối chiếu điểm khác", "thích/chọn hơn", "chọn"],
    grammar: {
      original: "Students should look at two methods together before choosing.",
      target: "Students should compare two methods before choosing.",
      hint: "Dùng 'compare A with B' hoặc 'compare two things'.",
      keywords: ["compare"]
    },
    toeic: {
      text: "Please _______ the two proposals before the meeting.",
      choices: ["compare", "prefer", "suitable", "criteria"],
      answer: 0,
      explain: "'compare the two proposals' = so sánh hai đề xuất."
    }
  },
  {
    word: "contrast",
    ipa: "/ˈkɑːn.træst/",
    meaning: "đối chiếu để nhấn mạnh điểm khác nhau",
    confusers: ["compare", "similar", "prefer"],
    confuserMeanings: ["so sánh chung", "tương tự", "thích/chọn hơn"],
    grammar: {
      original: "The report showed how online and classroom practice are different.",
      target: "The report contrasted online and classroom practice.",
      hint: "Dùng 'contrast A and B'.",
      keywords: ["contrasted"]
    },
    toeic: {
      text: "The presentation will _______ the current system and the new system.",
      choices: ["contrast", "suitable", "prefer", "criteria"],
      answer: 0,
      explain: "'contrast A and B' = đối chiếu A và B để thấy điểm khác."
    }
  },
  {
    word: "similar",
    ipa: "/ˈsɪm.ə.lɚ/",
    meaning: "tương tự, có điểm giống nhau",
    confusers: ["different", "same", "suitable"],
    confuserMeanings: ["khác", "giống hệt", "phù hợp"],
    grammar: {
      original: "The two apps have almost the same features.",
      target: "The two apps are similar in features.",
      hint: "Dùng 'similar to' hoặc 'similar in'.",
      keywords: ["similar"]
    },
    toeic: {
      text: "The two training programs are _______ in price.",
      choices: ["similar", "different", "prefer", "criteria"],
      answer: 0,
      explain: "'similar in price' = tương tự về giá."
    }
  },
  {
    word: "different",
    ipa: "/ˈdɪf.ɚ.ənt/",
    meaning: "khác nhau, không giống",
    confusers: ["similar", "same", "suitable"],
    confuserMeanings: ["tương tự", "giống hệt", "phù hợp"],
    grammar: {
      original: "The new process is not the same as the old process.",
      target: "The new process is different from the old process.",
      hint: "Dùng 'different from'.",
      keywords: ["different", "from"]
    },
    toeic: {
      text: "This year's schedule is _______ from last year's schedule.",
      choices: ["different", "similar", "advantage", "prefer"],
      answer: 0,
      explain: "'different from' = khác với."
    }
  },
  {
    word: "advantage",
    ipa: "/ədˈvæn.tɪdʒ/",
    meaning: "lợi thế hoặc điểm tốt của một lựa chọn",
    confusers: ["disadvantage", "criteria", "feature"],
    confuserMeanings: ["bất lợi", "tiêu chí", "tính năng"],
    grammar: {
      original: "Daily practice has one good point: it builds consistency.",
      target: "One advantage of daily practice is that it builds consistency.",
      hint: "Dùng 'an advantage of ...'.",
      keywords: ["advantage", "of"]
    },
    toeic: {
      text: "One _______ of the new software is faster reporting.",
      choices: ["advantage", "disadvantage", "criteria", "contrast"],
      answer: 0,
      explain: "'one advantage of...' = một lợi thế của..."
    }
  },
  {
    word: "disadvantage",
    ipa: "/ˌdɪs.ədˈvæn.tɪdʒ/",
    meaning: "bất lợi hoặc điểm yếu của một lựa chọn",
    confusers: ["advantage", "risk", "criteria"],
    confuserMeanings: ["lợi thế", "rủi ro", "tiêu chí"],
    grammar: {
      original: "Self-study has one weak point: feedback is limited.",
      target: "One disadvantage of self-study is limited feedback.",
      hint: "Dùng 'a disadvantage of ...'.",
      keywords: ["disadvantage", "of"]
    },
    toeic: {
      text: "A possible _______ of the plan is the high cost.",
      choices: ["disadvantage", "advantage", "similar", "prefer"],
      answer: 0,
      explain: "'disadvantage of the plan' = bất lợi của kế hoạch."
    }
  },
  {
    word: "criteria",
    ipa: "/kraɪˈtɪr.i.ə/",
    meaning: "tiêu chí dùng để đánh giá hoặc lựa chọn",
    confusers: ["reason", "preference", "standard"],
    confuserMeanings: ["lý do", "sở thích/lựa chọn ưu tiên", "tiêu chuẩn"],
    grammar: {
      original: "The team chose the tool based on cost, speed, and support.",
      target: "The team's criteria were cost, speed, and support.",
      hint: "Dùng 'criteria for choosing' hoặc 'criteria were ...'.",
      keywords: ["criteria"]
    },
    toeic: {
      text: "The selection _______ include price, quality, and delivery time.",
      choices: ["criteria", "advantage", "similar", "prefer"],
      answer: 0,
      explain: "'selection criteria' = tiêu chí lựa chọn."
    }
  },
  {
    word: "suitable",
    ipa: "/ˈsuː.t̬ə.bəl/",
    meaning: "phù hợp với mục tiêu, tình huống hoặc người dùng",
    confusers: ["similar", "preferred", "available"],
    confuserMeanings: ["tương tự", "được thích/chọn hơn", "có sẵn"],
    grammar: {
      original: "This plan fits busy learners.",
      target: "This plan is suitable for busy learners.",
      hint: "Dùng 'suitable for'.",
      keywords: ["suitable", "for"]
    },
    toeic: {
      text: "This room is _______ for small team meetings.",
      choices: ["suitable", "different", "criteria", "prefer"],
      answer: 0,
      explain: "'suitable for meetings' = phù hợp cho cuộc họp."
    }
  },
  {
    word: "prefer",
    ipa: "/prɪˈfɝː/",
    meaning: "thích hoặc chọn một lựa chọn hơn lựa chọn khác",
    confusers: ["compare", "select", "suitable"],
    confuserMeanings: ["so sánh", "chọn", "phù hợp"],
    grammar: {
      original: "Some learners like daily practice more than weekend practice.",
      target: "Some learners prefer daily practice to weekend practice.",
      hint: "Dùng 'prefer A to B'.",
      keywords: ["prefer", "to"]
    },
    toeic: {
      text: "Many customers _______ online support to phone support.",
      choices: ["prefer", "compare", "criteria", "different"],
      answer: 0,
      explain: "'prefer A to B' = thích/chọn A hơn B."
    }
  }
];

const PHASES = ['vocab','meaning','grammar','toeic'];
const PHASE_LABELS = ['Nghe & Viết','Nghĩa','Ngữ pháp','TOEIC'];

class DrillEngine {
  constructor(words) {
    this.words = words;
    this.wordIdx = 0;
    this.phase = 0;
    this.score = 0;
    this.total = words.length * 4;
    this.mistakes = [];
    this.answered = false;
    this.synth = window.speechSynthesis;
    this.voice = null;
    this.rate = 0.8;
    this._playToken = 0;
    this.loadVoice();
    this.render();
    this.updateScore();
    document.getElementById('totalNum').textContent = this.total;
  }

  loadVoice() {
    const set = () => { const v = this.synth.getVoices(); this.voice = v.find(x => x.lang.startsWith('en-US')) || v.find(x => x.lang.startsWith('en')) || v[0]; };
    set(); this.synth.onvoiceschanged = set;
  }

  speak(text, { cancelFirst = true } = {}) {
    if (cancelFirst) this.stopPlayback();
    const lessonId = 'buoi-12';
    return new Promise((resolve) => {
      let done = false;
      const finish = () => { if (!done) { done = true; resolve(); } };
      const safety = setTimeout(finish, 8000);
      const wrapEnd = () => { clearTimeout(safety); finish(); };
      const audioOptions = {
        lessonId,
        key: this.phase === 0 ? text : `drill:phase${this.phase}:${text}`,
        text,
        rate: this.rate,
        voice: this.voice,
        onend: wrapEnd,
      };
      if (window.AudioEngine) {
        window.AudioEngine.play(audioOptions);
        return;
      }
      if (this.phase === 0 && window.HumanAudio) {
        window.HumanAudio.play(audioOptions);
        return;
      }
      const u = new SpeechSynthesisUtterance(text);
      u.voice = this.voice;
      u.rate = this.rate;
      u.onend = wrapEnd;
      u.onerror = wrapEnd;
      this.synth.speak(u);
    });
  }

  stopPlayback() {
    this._playToken += 1;
    this.synth.cancel();
    if (window.HumanAudio && window.HumanAudio.cancel) window.HumanAudio.cancel();
  }

  async waitForPlaybackToFinish(token) {
    if (token !== this._playToken) return;
  }

  delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
  get currentWord() { return this.words[this.wordIdx]; }

  renderPhaseBar() {
    const total = this.words.length * 4;
    const current = this.wordIdx * 4 + this.phase;
    const bar = document.getElementById('phaseBar');
    bar.innerHTML = '';
    for (let i = 0; i < total; i++) {
      const dot = document.createElement('div');
      dot.className = 'phase-dot' + (i < current ? ' done' : i === current ? ' active' : '');
      bar.appendChild(dot);
    }
  }

  render() {
    this.stopPlayback();
    this.answered = false;
    this.renderPhaseBar();
    document.getElementById('btnNext').disabled = true;
    const card = document.getElementById('drillCard');
    const w = this.currentWord;
    const p = PHASES[this.phase];
    if (p === 'vocab') this.renderVocab(card, w);
    else if (p === 'meaning') this.renderMeaning(card, w);
    else if (p === 'grammar') this.renderGrammar(card, w);
    else if (p === 'toeic') this.renderToeic(card, w);
  }

  renderVocab(card, w) {
    card.innerHTML = `
      <div class="phase-label">Phase 1/4 — Nghe & Viết chính tả</div>
      <div class="sub-prompt">Nghe từ và gõ lại chính xác</div>
      <div class="speed-control"><label>Tốc độ:</label><select id="speedSel"><option value="0.6">0.6x</option><option value="0.7">0.7x</option><option value="0.8" selected>0.8x</option><option value="1">1x</option></select></div>
      <button class="audio-btn" id="playBtn">&#9654; Nghe (3 lần)</button>
      <input class="drill-input" id="vocabInput" placeholder="Gõ từ bạn nghe..." autocomplete="off" spellcheck="false">
      <div class="feedback-box" id="fb"></div>
      <div class="hint-text" id="hintBtn">Gợi ý: ${w.ipa}</div>
    `;
    const playBtn = document.getElementById('playBtn');
    const input = document.getElementById('vocabInput');
    const speedSel = document.getElementById('speedSel');
    speedSel.onchange = () => { this.rate = parseFloat(speedSel.value); };
    playBtn.onclick = () => this.playRepeated(w.word, 3);
    setTimeout(() => playBtn.click(), 300);
    input.onkeydown = (e) => { if (e.key === 'Enter') this.checkVocab(); };
  }

  checkVocab() {
    if (this.answered) return;
    const input = document.getElementById('vocabInput');
    const val = input.value.trim().toLowerCase();
    const w = this.currentWord;
    const fb = document.getElementById('fb');
    this.answered = true;
    if (val === w.word.toLowerCase()) {
      input.classList.add('correct');
      fb.className = 'feedback-box show ok';
      fb.textContent = `Chính xác! "${w.word}" ${w.ipa}`;
      this.score++;
    } else {
      input.classList.add('wrong');
      fb.className = 'feedback-box show err';
      fb.innerHTML = `Sai. Đáp án: <strong>${w.word}</strong> ${w.ipa}<br>Bạn viết: "${val}"`;
      this.mistakes.push({ word: w.word, phase: 'spelling', detail: `Viết "${val}" thay vì "${w.word}"` });
    }
    this.updateScore();
    document.getElementById('btnNext').disabled = false;
  }

  renderMeaning(card, w) {
    const options = this.shuffleArray([{ text: w.meaning, correct: true }, ...w.confusers.map((c, i) => ({ text: `${c}: ${w.confuserMeanings[i]}`, correct: false }))]);
    card.innerHTML = `
      <div class="phase-label">Phase 2/4 — Chọn nghĩa đúng</div>
      <div class="word-prompt">${w.word}</div>
      <div class="sub-prompt">Chọn nghĩa chính xác của từ này:</div>
      <ul class="choices" id="meaningChoices">${options.map((o, i) => `<li data-idx="${i}" data-correct="${o.correct}">${String.fromCharCode(65+i)}. ${o.text}</li>`).join('')}</ul>
      <div class="feedback-box" id="fb"></div>
    `;
    card.querySelectorAll('.choices li').forEach(li => { li.onclick = () => this.checkMeaning(li); });
  }

  checkMeaning(li) {
    if (this.answered) return;
    this.answered = true;
    const fb = document.getElementById('fb');
    const w = this.currentWord;
    document.querySelectorAll('.choices li').forEach(el => { if (el.dataset.correct === 'true') el.classList.add('correct'); });
    if (li.dataset.correct === 'true') {
      li.classList.add('correct');
      fb.className = 'feedback-box show ok';
      fb.textContent = 'Chính xác!';
      this.score++;
    } else {
      li.classList.add('wrong');
      fb.className = 'feedback-box show err';
      fb.innerHTML = `Sai. "${w.word}" = ${w.meaning}`;
      this.mistakes.push({ word: w.word, phase: 'meaning', detail: 'Chọn sai nghĩa' });
    }
    this.updateScore();
    document.getElementById('btnNext').disabled = false;
  }

  renderGrammar(card, w) {
    const g = w.grammar;
    card.innerHTML = `
      <div class="phase-label">Phase 3/4 — Viết lại câu</div>
      <div class="transform-box"><div class="original">${g.original}</div><div class="arrow">&#8595; Viết lại dùng từ gợi ý:</div></div>
      <div class="sub-prompt">Gõ câu viết lại (chứa từ: <strong>${g.keywords.join(', ')}</strong>)</div>
      <input class="drill-input" id="gramInput" placeholder="Viết lại câu..." autocomplete="off" spellcheck="false">
      <div class="hint-text" id="gramHint" onclick="this.textContent='Gợi ý: ${g.hint.replace(/'/g, "\\'")}'">Nhấn để xem gợi ý</div>
      <div class="feedback-box" id="fb"></div>
    `;
    document.getElementById('gramInput').onkeydown = (e) => { if (e.key === 'Enter') this.checkGrammar(); };
  }

  checkGrammar() {
    if (this.answered) return;
    const input = document.getElementById('gramInput');
    const val = input.value.trim().toLowerCase();
    const w = this.currentWord;
    const g = w.grammar;
    const fb = document.getElementById('fb');
    this.answered = true;
    const hasKeywords = g.keywords.every(k => val.includes(k.toLowerCase()));
    if (hasKeywords && val.length > 15) {
      input.classList.add('correct');
      fb.className = 'feedback-box show ok';
      fb.innerHTML = `Tốt! Câu mẫu:<br><em>${g.target}</em>`;
      this.score++;
    } else {
      input.classList.add('wrong');
      fb.className = 'feedback-box show err';
      fb.innerHTML = `Chưa đúng. Cần chứa: <strong>${g.keywords.join(', ')}</strong><br>Câu mẫu: <em>${g.target}</em>`;
      this.mistakes.push({ word: w.word, phase: 'grammar', detail: 'Thiếu keyword hoặc câu quá ngắn' });
    }
    this.updateScore();
    document.getElementById('btnNext').disabled = false;
  }

  renderToeic(card, w) {
    const t = w.toeic;
    const indices = this.shuffleIndices(t.choices.length);
    const shuffled = indices.map(i => t.choices[i]);
    const correctIdx = indices.indexOf(t.answer);
    card.innerHTML = `
      <div class="phase-label">Phase 4/4 — TOEIC Fill-in-the-blank</div>
      <div class="sub-prompt" style="font-size:1rem; line-height:1.8;">${t.text}</div>
      <ul class="choices" id="toeicChoices">${shuffled.map((c, i) => `<li data-idx="${i}" data-correct="${i===correctIdx}">${String.fromCharCode(65+i)}. ${c}</li>`).join('')}</ul>
      <div class="feedback-box" id="fb"></div>
    `;
    card.querySelectorAll('.choices li').forEach(li => { li.onclick = () => this.checkToeic(li, t); });
  }

  checkToeic(li, t) {
    if (this.answered) return;
    this.answered = true;
    const fb = document.getElementById('fb');
    const w = this.currentWord;
    document.querySelectorAll('.choices li').forEach(el => { if (el.dataset.correct === 'true') el.classList.add('correct'); });
    if (li.dataset.correct === 'true') {
      li.classList.add('correct');
      fb.className = 'feedback-box show ok';
      fb.innerHTML = `Chính xác! ${t.explain}`;
      this.score++;
    } else {
      li.classList.add('wrong');
      fb.className = 'feedback-box show err';
      fb.innerHTML = `Sai. ${t.explain}`;
      this.mistakes.push({ word: w.word, phase: 'toeic', detail: t.explain });
    }
    this.updateScore();
    document.getElementById('btnNext').disabled = false;
  }

  next() {
    this.phase++;
    if (this.phase >= 4) { this.phase = 0; this.wordIdx++; }
    if (this.wordIdx >= this.words.length) { this.showResults(); return; }
    this.render();
  }

  skip() {
    this.mistakes.push({ word: this.currentWord.word, phase: PHASE_LABELS[this.phase], detail: 'Bỏ qua' });
    this.next();
  }

  showResults() {
    const pct = Math.round((this.score / this.total) * 100);
    const card = document.getElementById('drillCard');
    const phaseScores = {};
    PHASE_LABELS.forEach(p => { phaseScores[p] = { correct: 0, total: 0 }; });
    this.words.forEach(w => {
      PHASE_LABELS.forEach((p, pi) => {
        phaseScores[p].total++;
        const wasMistake = this.mistakes.some(m => m.word === w.word && (m.phase === PHASES[pi] || m.phase === p));
        if (!wasMistake) phaseScores[p].correct++;
      });
    });
    let breakdownHtml = '';
    PHASE_LABELS.forEach(p => { const s = phaseScores[p]; breakdownHtml += `<div class="breakdown-row"><span>${p}</span><span>${s.correct}/${s.total}</span></div>`; });
    let mistakesHtml = '';
    if (this.mistakes.length > 0) {
      mistakesHtml = `<div class="mistakes-list"><h4>Cần ôn lại:</h4>`;
      this.mistakes.forEach(m => { mistakesHtml += `<div class="mistake-item"><div class="mword">${m.word} (${m.phase})</div><div class="mdetail">${m.detail}</div></div>`; });
      mistakesHtml += `</div>`;
    }
    card.innerHTML = `
      <div class="results-panel">
        <div class="big-score">${pct}%</div>
        <p>${this.score}/${this.total} câu đúng</p>
        <div class="breakdown">${breakdownHtml}</div>
        ${mistakesHtml}
        <button class="btn btn-play" style="margin-top:1.5rem;" onclick="location.reload()">Làm lại</button>
        <a href="../lessons/buoi-12-reading.html" class="btn btn-secondary" style="margin-top:0.5rem; display:inline-block;">Đọc tiếp Buổi 12 &rarr;</a>
      </div>
    `;
    document.getElementById('phaseBar').innerHTML = '';
    document.getElementById('btnNext').style.display = 'none';
    document.getElementById('btnSkip').style.display = 'none';
    this.saveResult(pct);
  }

  saveResult(pct) {
    const key = 'drill_b12_history';
    const history = JSON.parse(localStorage.getItem(key) || '[]');
    history.push({ date: new Date().toISOString(), score: pct, mistakes: this.mistakes.length });
    if (window.WordStats) WordStats.recordDrill(this.words, this.mistakes);
    localStorage.setItem(key, JSON.stringify(history.slice(-20)));
  }

  shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [a[i],a[j]] = [a[j],a[i]]; }
    return a;
  }

  shuffleIndices(len) {
    const a = Array.from({length: len}, (_, i) => i);
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [a[i],a[j]] = [a[j],a[i]]; }
    return a;
  }

  updateScore() { document.getElementById('scoreNum').textContent = this.score; }
}

const engine = new DrillEngine(WORDS);
document.getElementById('btnNext').onclick = () => engine.next();
document.getElementById('btnSkip').onclick = () => engine.skip();
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !document.getElementById('btnNext').disabled && document.activeElement.tagName !== 'INPUT') engine.next();
});
</script>
