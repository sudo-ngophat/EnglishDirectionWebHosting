<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f5f5"/>
  <!-- Desk -->
  <rect x="30" y="180" width="340" height="15" fill="#8B4513" rx="3"/>
  <!-- Monitor 1 -->
  <rect x="60" y="100" width="80" height="60" fill="#2c3e50" rx="4"/>
  <rect x="65" y="105" width="70" height="50" fill="#1a1a2e"/>
  <text x="80" y="135" font-size="8" fill="#2ecc71" font-family="monospace">&lt;code/&gt;</text>
  <rect x="90" y="160" width="20" height="20" fill="#555"/>
  <!-- Monitor 2 -->
  <rect x="160" y="100" width="80" height="60" fill="#2c3e50" rx="4"/>
  <rect x="165" y="105" width="70" height="50" fill="#1a1a2e"/>
  <text x="175" y="130" font-size="7" fill="#3498db" font-family="monospace">function()</text>
  <text x="175" y="142" font-size="7" fill="#e74c3c" font-family="monospace">  return x</text>
  <rect x="190" y="160" width="20" height="20" fill="#555"/>
  <!-- Monitor 3 -->
  <rect x="260" y="100" width="80" height="60" fill="#2c3e50" rx="4"/>
  <rect x="265" y="105" width="70" height="50" fill="#1a1a2e"/>
  <text x="275" y="135" font-size="8" fill="#f39c12" font-family="monospace">deploy</text>
  <rect x="290" y="160" width="20" height="20" fill="#555"/>
  <!-- Person 1 -->
  <circle cx="100" cy="220" r="15" fill="#fdbcb4"/>
  <rect x="85" y="235" width="30" height="35" fill="#3498db" rx="3"/>
  <!-- Person 2 -->
  <circle cx="200" cy="220" r="15" fill="#d4a574"/>
  <rect x="185" y="235" width="30" height="35" fill="#e74c3c" rx="3"/>
  <!-- Person 3 -->
  <circle cx="300" cy="220" r="15" fill="#fdbcb4"/>
  <rect x="285" y="235" width="30" height="35" fill="#2ecc71" rx="3"/>
  <!-- Keyboards -->
  <rect x="65" y="172" width="50" height="8" fill="#bbb" rx="2"/>
  <rect x="170" y="172" width="50" height="8" fill="#bbb" rx="2"/>
  <rect x="270" y="172" width="50" height="8" fill="#bbb" rx="2"/>
</svg>