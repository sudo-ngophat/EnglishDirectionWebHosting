<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f5f5"/>
  <!-- Tailor figure -->
  <circle cx="150" cy="90" r="22" fill="#fdbcb4"/>
  <path d="M128 90 Q128 65 150 65 Q172 65 172 90" fill="#555"/>
  <rect x="130" y="112" width="40" height="55" fill="#2c3e50" rx="4"/>
  <rect x="130" y="167" width="15" height="45" fill="#34495e" rx="3"/>
  <rect x="155" y="167" width="15" height="45" fill="#34495e" rx="3"/>
  <!-- Glasses -->
  <circle cx="143" cy="88" r="6" stroke="#333" stroke-width="2" fill="none"/>
  <circle cx="157" cy="88" r="6" stroke="#333" stroke-width="2" fill="none"/>
  <line x1="149" y1="88" x2="151" y2="88" stroke="#333" stroke-width="2"/>
  <!-- Suit jacket on mannequin -->
  <rect x="240" y="80" width="80" height="120" fill="#1a237e" rx="5"/>
  <path d="M240 80 L280 70 L320 80" fill="#1a237e"/>
  <line x1="280" y1="70" x2="280" y2="200" stroke="#283593" stroke-width="1"/>
  <!-- Lapels -->
  <path d="M260 80 L280 110 L280 80" fill="#0d47a1"/>
  <path d="M300 80 L280 110 L280 80" fill="#0d47a1"/>
  <!-- Mannequin stand -->
  <rect x="275" y="200" width="10" height="60" fill="#795548"/>
  <ellipse cx="280" cy="265" rx="30" ry="8" fill="#795548"/>
  <!-- Tailor's arm with needle -->
  <path d="M170 130 Q200 140 235 150" stroke="#fdbcb4" stroke-width="7" stroke-linecap="round"/>
  <!-- Needle and thread -->
  <line x1="235" y1="150" x2="250" y2="145" stroke="#bbb" stroke-width="2"/>
  <path d="M250 145 Q260 160 255 170" stroke="#e74c3c" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
  <!-- Measuring tape -->
  <path d="M130 140 Q120 160 125 180" stroke="#f1c40f" stroke-width="4" fill="none"/>
</svg>