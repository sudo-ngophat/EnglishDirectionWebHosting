<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Mix — Ôn trộn 20 buổi</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .rm-controls { display: flex; flex-wrap: wrap; gap: 0.8rem; align-items: center; margin-bottom: 1.2rem; }
    .rm-controls select { padding: 0.5rem 0.8rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; }
    .rm-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; font-size: 0.85rem; color: var(--text-dim); }
    .rm-topbar .streak b { color: var(--success); }
    .rm-progress { height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 1.2rem; }
    .rm-progress > div { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--success)); transition: width 0.3s; }
    .rm-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem 1.5rem; text-align: center; min-height: 340px; }
    .rm-tag { display: inline-block; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); background: var(--card); padding: 0.25rem 0.7rem; border-radius: 20px; margin-bottom: 1rem; }
    .rm-tag.weak { color: var(--accent-light); border: 1px solid var(--accent); }
    .rm-prompt-label { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.4rem; }
    .rm-prompt { font-size: 2.2rem; font-weight: 800; color: var(--text); letter-spacing: 0.01em; }
    .rm-prompt .listen { font-size: 1.2rem; cursor: pointer; margin-left: 0.6rem; opacity: 0.7; }
    .rm-prompt .listen:hover { opacity: 1; }
    .rm-sub { font-size: 0.95rem; color: var(--success); margin-top: 0.3rem; min-height: 1.2rem; }
    .rm-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; margin-top: 1.6rem; }
    @media (max-width: 520px) { .rm-choices { grid-template-columns: 1fr; } }
    .rm-choice { padding: 0.9rem 1rem; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); cursor: pointer; font-size: 1rem; text-align: left; transition: all 0.15s; }
    .rm-choice:hover:not(:disabled) { border-color: var(--accent); }
    .rm-choice:disabled { cursor: default; }
    .rm-choice.correct { border-color: var(--success); background: rgba(0,210,211,0.12); color: var(--success); }
    .rm-choice.wrong { border-color: var(--accent); background: rgba(233,69,96,0.12); color: var(--accent-light); }
    .rm-feedback { margin-top: 1.2rem; font-size: 0.9rem; min-height: 1.4rem; color: var(--text-dim); }
    .rm-feedback b { color: var(--text); }
    .rm-next { margin-top: 1.2rem; display: none; }
    .rm-next.show { display: inline-block; }
    .rm-summary { text-align: center; }
    .rm-summary .big-score { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--success)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .rm-weaklist { text-align: left; margin: 1.2rem auto 0; max-width: 420px; }
    .rm-weaklist h4 { color: var(--accent-light); margin-bottom: 0.5rem; font-size: 0.9rem; }
    .rm-weakitem { display: flex; justify-content: space-between; padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    .rm-weakitem .w { color: var(--text); font-weight: 600; }
    .rm-weakitem .m { color: var(--text-dim); }
    .rm-weakitem .miss { color: var(--accent); font-size: 0.78rem; }
    .warn-box { background: rgba(233,69,96,0.08); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.8rem 1rem; margin-bottom: 1.2rem; font-size: 0.82rem; color: var(--text-dim); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="index.html">&larr;</a>
      <h1>Review Mix</h1>
    </div>
    <p class="hint">Ôn trộn từ vựng cả 20 buổi. Từ nào bạn hay sai sẽ xuất hiện nhiều hơn (spaced repetition).</p>

    <div class="rm-controls">
      <label>Phạm vi:</label>
      <select id="scopeSel"></select>
      <label>Số câu:</label>
      <select id="lenSel">
        <option value="10">10</option>
        <option value="20" selected>20</option>
        <option value="30">30</option>
        <option value="0">Tất cả</option>
      </select>
      <button class="btn btn-play" id="btnStart">Bắt đầu</button>
    </div>

    <div id="quizArea" style="display:none;">
      <div class="rm-topbar">
        <div class="counter">Câu <span class="num" id="curNum">1</span> / <span id="totalNum">20</span></div>
        <div class="streak">Chuỗi đúng: <b id="streakNum">0</b> · Đúng <span id="rightNum">0</span></div>
      </div>
      <div class="rm-progress"><div id="progFill"></div></div>

      <div class="rm-card" id="quizCard"></div>
      <div style="text-align:center;">
        <button class="btn btn-play rm-next" id="btnNext">Câu tiếp &rarr;</button>
      </div>
    </div>

    <div id="summaryArea" style="display:none;"></div>
  </div>

  <script src="js/pronunciation-data.js"></script>
  <script src="js/human-audio.js"></script>
  <script src="js/review-mix.js"></script>
</body>
</html>
